services:
  postgres:
    image: postgres:${POSTGRES_IMAGE_TAG:-17}
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dtpm
      POSTGRES_PASSWORD: dtpm
      POSTGRES_DB: dtpm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtpm -d dtpm"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-migrate:
    image: dtpm-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "dist/infra/persistence/migrate.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://dtpm:dtpm@postgres:5432/dtpm
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-development-key}
      CORS_ORIGIN: http://localhost:${WEB_HOST_PORT:-8081}
      PROVISIONING_TOKEN_TTL_MINUTES: ${PROVISIONING_TOKEN_TTL_MINUTES:-30}
      CHECKOUT_LEASE_TTL_MINUTES: ${CHECKOUT_LEASE_TTL_MINUTES:-30}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    image: dtpm-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://dtpm:dtpm@postgres:5432/dtpm
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-development-key}
      CORS_ORIGIN: http://localhost:${WEB_HOST_PORT:-8081}
      PROVISIONING_TOKEN_TTL_MINUTES: ${PROVISIONING_TOKEN_TTL_MINUTES:-30}
      CHECKOUT_LEASE_TTL_MINUTES: ${CHECKOUT_LEASE_TTL_MINUTES:-30}
    depends_on:
      postgres:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: dtpm-web:local
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${WEB_HOST_PORT:-8081}:80"
    environment:
      WEB_PORT: 80
      API_BASE_URL: /api
      ADMIN_API_KEY: ${WEB_ADMIN_API_KEY:-}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:

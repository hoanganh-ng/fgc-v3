services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dtpm
      POSTGRES_PASSWORD: dtpm
      POSTGRES_DB: dtpm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtpm -d dtpm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
